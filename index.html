
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovAI — Chatbot Cerdasmu</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Mulish:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ===== RESET & ROOT ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:       #070910;
  --surface:  #0F111A;
  --card:     #151821;
  --border:   rgba(255,255,255,0.06);
  --bactive:  rgba(99,179,237,0.3);
  --cyan:     #63B3ED;
  --cyandim:  #3A7DBF;
  --cyanglow: rgba(99,179,237,0.12);
  --violet:   #9F7AEA;
  --text:     #E2E8F0;
  --muted:    #4A5568;
  --muted2:   #718096;
  --ubub:     #1A2035;
  --aibub:    #111520;
  --green:    #48BB78;
  --sidebar-w:240px;
}

html,body { height:100%; background:var(--bg); color:var(--text);
  font-family:'Mulish',sans-serif; overflow:hidden; }

/* BG grid */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    linear-gradient(rgba(99,179,237,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(99,179,237,0.025) 1px,transparent 1px);
  background-size:44px 44px;
}
body::after {
  content:''; position:fixed; bottom:-20%; right:-10%;
  width:500px; height:500px; pointer-events:none; z-index:0;
  background:radial-gradient(ellipse,rgba(159,122,234,0.07) 0%,transparent 65%);
}

/* ===== LAYOUT ===== */
.layout { position:relative; z-index:1; display:flex; height:100vh; }

/* ===== SIDEBAR ===== */
.sidebar {
  width:var(--sidebar-w); flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  transition:transform .3s ease;
}

.sidebar-head {
  padding:18px 14px 12px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}

.logo-box {
  width:34px; height:34px; border-radius:10px;
  background:linear-gradient(135deg,var(--cyandim),var(--violet));
  display:flex; align-items:center; justify-content:center; font-size:17px;
  flex-shrink:0; box-shadow:0 0 18px rgba(99,179,237,0.18);
}

.logo-text { font-family:'Syne',sans-serif; font-size:16px; font-weight:700;
  letter-spacing:.02em; color:var(--text); flex:1; }

.new-btn {
  width:28px; height:28px; border:1px solid var(--border); background:transparent;
  border-radius:7px; cursor:pointer; display:flex; align-items:center;
  justify-content:center; color:var(--muted2); transition:all .15s;
}
.new-btn:hover { border-color:var(--bactive); color:var(--cyan); background:var(--cyanglow); }

/* search */
.sidebar-search { padding:10px 12px; }
.sidebar-search input {
  width:100%; background:var(--card); border:1px solid var(--border);
  border-radius:8px; padding:7px 10px; font-family:inherit; font-size:12.5px;
  color:var(--text); outline:none; transition:border .15s;
}
.sidebar-search input::placeholder { color:var(--muted); }
.sidebar-search input:focus { border-color:var(--cyandim); }

/* persona section */
.sidebar-label {
  padding:4px 14px 6px;
  font-size:10px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--muted); font-weight:500;
}

.persona-list { padding:0 8px; display:flex; flex-direction:column; gap:2px; }

.p-item {
  display:flex; align-items:center; gap:9px;
  padding:8px 10px; border-radius:8px; cursor:pointer;
  border:1px solid transparent; transition:all .15s;
  font-size:13px; color:var(--muted2);
}
.p-item:hover { background:var(--card); color:var(--text); }
.p-item.active { background:var(--cyanglow); border-color:var(--bactive); color:var(--cyan); }
.p-icon { font-size:15px; }

/* history */
.history-list { flex:1; overflow-y:auto; padding:0 8px 8px; }
.history-list::-webkit-scrollbar { width:2px; }
.history-list::-webkit-scrollbar-thumb { background:var(--border); }

.h-item {
  padding:8px 10px; border-radius:8px; cursor:pointer;
  transition:background .12s; margin-bottom:2px;
}
.h-item:hover { background:var(--card); }
.h-title { font-size:12.5px; color:var(--text); white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis; }
.h-preview { font-size:11px; color:var(--muted); white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis; margin-top:1px; }

/* sidebar footer */
.sidebar-foot {
  border-top:1px solid var(--border); padding:10px 8px;
}
.user-row {
  display:flex; align-items:center; gap:9px;
  padding:8px 10px; border-radius:8px; cursor:pointer; transition:background .12s;
}
.user-row:hover { background:var(--card); }
.u-av {
  width:30px; height:30px; border-radius:8px;
  background:linear-gradient(135deg,var(--cyandim),var(--violet));
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; font-family:'Syne',sans-serif;
  color:white; flex-shrink:0;
}
.u-name { font-size:13px; color:var(--text); font-weight:500; }
.u-plan { font-size:10.5px; color:var(--muted); }

/* ===== MAIN ===== */
.main { flex:1; display:flex; flex-direction:column; min-width:0; }

/* topbar */
.topbar {
  height:54px; border-bottom:1px solid var(--border);
  background:rgba(7,9,16,.85); backdrop-filter:blur(12px);
  display:flex; align-items:center; padding:0 20px; gap:12px;
  flex-shrink:0;
}

.menu-btn {
  display:none; width:32px; height:32px; border:1px solid var(--border);
  background:transparent; border-radius:8px; cursor:pointer;
  align-items:center; justify-content:center; color:var(--muted2);
  transition:all .15s;
}
.menu-btn:hover { border-color:var(--bactive); color:var(--cyan); }

.top-persona {
  display:flex; align-items:center; gap:7px;
  padding:5px 12px; border:1px solid var(--border);
  border-radius:20px; font-size:12.5px; color:var(--text);
  background:var(--card);
}
.top-dot { width:6px; height:6px; border-radius:50%; background:var(--green);
  animation:pdot 2s ease infinite; }
@keyframes pdot {
  0%,100% { box-shadow:0 0 0 0 rgba(72,187,120,.4); }
  50% { box-shadow:0 0 0 5px rgba(72,187,120,0); }
}

.top-actions { margin-left:auto; display:flex; gap:6px; }
.top-btn {
  width:32px; height:32px; border:1px solid var(--border);
  background:transparent; border-radius:8px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:var(--muted2); transition:all .15s;
}
.top-btn:hover { border-color:var(--bactive); color:var(--cyan); background:var(--cyanglow); }

/* messages */
.messages {
  flex:1; overflow-y:auto; padding:28px 20px;
  scroll-behavior:smooth; display:flex; flex-direction:column; gap:22px;
}
.messages::-webkit-scrollbar { width:3px; }
.messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* welcome */
.welcome {
  text-align:center; padding:50px 20px 30px;
  animation:fadeUp .6s ease both;
}
.w-glyph { font-size:52px; display:block; margin-bottom:18px;
  filter:drop-shadow(0 0 22px rgba(99,179,237,.35)); }
.welcome h2 { font-family:'Syne',sans-serif; font-size:28px; font-weight:700;
  letter-spacing:-.01em; color:var(--text); margin-bottom:8px; }
.welcome p { font-size:14px; color:var(--muted2); max-width:380px;
  margin:0 auto 30px; line-height:1.65; font-weight:300; }

.quick-grid { display:grid; grid-template-columns:repeat(2,1fr);
  gap:9px; max-width:500px; margin:0 auto; }
.q-btn {
  padding:12px 14px; background:var(--card);
  border:1px solid var(--border); border-radius:11px;
  color:var(--text); font-family:inherit; font-size:12.5px;
  text-align:left; cursor:pointer; transition:all .15s; line-height:1.4;
}
.q-btn:hover { border-color:var(--cyandim); background:var(--cyanglow); color:var(--cyan); }
.q-icon { font-size:16px; display:block; margin-bottom:5px; }

/* message rows */
.msg-row { display:flex; gap:11px; animation:msgIn .3s ease; }
.msg-row.user { flex-direction:row-reverse; }
@keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

.m-av {
  width:32px; height:32px; border-radius:10px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; margin-top:2px;
}
.msg-row.ai .m-av {
  background:linear-gradient(135deg,var(--cyandim),var(--violet));
  box-shadow:0 0 14px rgba(99,179,237,.15);
}
.msg-row.user .m-av {
  background:var(--ubub); border:1px solid var(--border);
  font-size:12px; font-weight:700; color:var(--cyan);
  font-family:'Syne',sans-serif;
}

.m-body { flex:1; max-width:calc(100% - 43px); }
.msg-row.user .m-body { display:flex; flex-direction:column; align-items:flex-end; }

.bubble {
  padding:12px 16px; border-radius:14px;
  font-size:14px; line-height:1.72; max-width:88%;
}
.msg-row.ai .bubble {
  background:var(--aibub); border:1px solid var(--border);
  border-radius:4px 14px 14px 14px; color:var(--text);
}
.msg-row.user .bubble {
  background:var(--ubub); border:1px solid rgba(99,179,237,.14);
  border-radius:14px 4px 14px 14px; color:var(--text);
}
.bubble code {
  font-family:'SF Mono','Fira Code',monospace; font-size:12.5px;
  background:rgba(99,179,237,.09); color:var(--cyan);
  padding:1px 5px; border-radius:4px;
}
.bubble pre {
  background:#080A12; border:1px solid var(--border); border-radius:9px;
  padding:14px; margin:10px 0; overflow-x:auto;
  font-family:'SF Mono','Fira Code',monospace;
  font-size:12.5px; color:#A0C4FF; line-height:1.6;
}
.bubble pre code { background:transparent; color:inherit; padding:0; }
.bubble strong { color:var(--cyan); font-weight:600; }
.bubble em { color:var(--violet); }
.bubble p+p { margin-top:8px; }

.m-meta { font-size:10.5px; color:var(--muted); margin-top:5px;
  display:flex; gap:8px; align-items:center; }
.msg-row.user .m-meta { justify-content:flex-end; }
.meta-btn { cursor:pointer; transition:color .12s; }
.meta-btn:hover { color:var(--cyan); }

/* typing */
.typing-bub {
  padding:13px 17px; background:var(--aibub);
  border:1px solid var(--border); border-radius:4px 14px 14px 14px;
  display:inline-flex; gap:5px; align-items:center;
}
.td { width:6px; height:6px; border-radius:50%; background:var(--cyandim);
  animation:td 1.3s ease infinite; }
.td:nth-child(2) { animation-delay:.2s; background:var(--violet); }
.td:nth-child(3) { animation-delay:.4s; }
@keyframes td { 0%,60%,100%{transform:scale(1);opacity:.4} 30%{transform:scale(1.45);opacity:1} }

/* ===== INPUT ===== */
.input-wrap {
  padding:12px 20px 18px; flex-shrink:0;
  background:rgba(7,9,16,.85); backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
}
.input-box {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; transition:border .2s,box-shadow .2s;
  max-width:820px; margin:0 auto;
}
.input-box:focus-within {
  border-color:var(--cyandim);
  box-shadow:0 0 0 3px rgba(99,179,237,.08);
}
.i-row { display:flex; align-items:flex-end; padding:12px 12px 8px; gap:8px; }
#chatInput {
  flex:1; background:transparent; border:none; outline:none;
  resize:none; font-family:inherit; font-size:14px;
  color:var(--text); line-height:1.55; max-height:160px; min-height:22px;
}
#chatInput::placeholder { color:var(--muted); }
.send-btn {
  width:34px; height:34px; border-radius:9px; border:none;
  background:linear-gradient(135deg,var(--cyandim),#2B6CB0);
  color:white; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; flex-shrink:0;
  box-shadow:0 2px 14px rgba(99,179,237,.22);
}
.send-btn:hover { opacity:.88; transform:scale(1.06); }
.send-btn:active { transform:scale(.97); }
.send-btn:disabled { opacity:.35; cursor:not-allowed; transform:none; }
.i-foot { display:flex; align-items:center; padding:0 12px 10px; gap:6px; }
.f-chip {
  display:flex; align-items:center; gap:4px;
  padding:3px 9px; border:1px solid var(--border);
  border-radius:12px; background:transparent;
  color:var(--muted2); font-family:inherit; font-size:11.5px; cursor:pointer;
  transition:all .12s;
}
.f-chip:hover { border-color:var(--bactive); color:var(--cyan); }
.char-ct { margin-left:auto; font-size:11px; color:var(--muted); }
.stats-row { display:flex; gap:16px; padding:6px 0 0;
  max-width:820px; margin:0 auto; }
.stat { font-size:10.5px; color:var(--muted); display:flex; align-items:center; gap:4px; }
.stat-v { color:var(--cyan); font-weight:500; }

/* ===== MOBILE ===== */
@media(max-width:640px){
  .sidebar { position:fixed; left:0; top:0; bottom:0; z-index:100;
    transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  .menu-btn { display:flex; }
  .quick-grid { grid-template-columns:1fr; }
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
    z-index:99; }
  .overlay.show { display:block; }
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="logo-box">🤖</div>
      <span class="logo-text">NovAI</span>
      <button class="new-btn" onclick="newChat()" title="Chat baru">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <div class="sidebar-search">
      <input type="text" placeholder="Cari percakapan…">
    </div>

    <div class="sidebar-label">Persona</div>
    <div class="persona-list">
      <div class="p-item active" onclick="setPersona(this,'default','🌐 Umum')">
        <span class="p-icon">🌐</span> Umum
      </div>
      <div class="p-item" onclick="setPersona(this,'programmer','💻 Programmer')">
        <span class="p-icon">💻</span> Programmer
      </div>
      <div class="p-item" onclick="setPersona(this,'teacher','📚 Guru')">
        <span class="p-icon">📚</span> Guru
      </div>
      <div class="p-item" onclick="setPersona(this,'motivator','🔥 Motivator')">
        <span class="p-icon">🔥</span> Motivator
      </div>
      <div class="p-item" onclick="setPersona(this,'friend','😊 Teman Curhat')">
        <span class="p-icon">😊</span> Teman Curhat
      </div>
      <div class="p-item" onclick="setPersona(this,'writer','✍️ Penulis')">
        <span class="p-icon">✍️</span> Penulis
      </div>
    </div>

    <div class="sidebar-label" style="margin-top:14px">Riwayat</div>
    <div class="history-list" id="historyList">
      <div style="padding:8px 10px;font-size:12px;color:var(--muted)">
        Belum ada riwayat
      </div>
    </div>

    <div class="sidebar-foot">
      <div class="user-row">
        <div class="u-av">K</div>
        <div>
          <div class="u-name">Kamu</div>
          <div class="u-plan">NovAI · Gratis</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="top-persona">
        <div class="top-dot"></div>
        <span id="topPersonaLabel">🌐 Umum</span>
      </div>
      <div class="top-actions">
        <button class="top-btn" title="Ekspor" onclick="exportChat()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="top-btn" title="Hapus chat" onclick="clearChat()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>

    <!-- MESSAGES -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcomeEl">
        <span class="w-glyph">🤖</span>
        <h2>Halo! Aku NovAI</h2>
        <p>Chatbot AI pintarmu. Pilih persona di sidebar, lalu mulai ngobrol!</p>
        <div class="quick-grid">
          <button class="q-btn" onclick="quickSend('Jelaskan cara kerja AI dengan bahasa yang mudah')">
            <span class="q-icon">🧠</span>Jelaskan cara kerja AI
          </button>
          <button class="q-btn" onclick="quickSend('Buatkan fungsi Python untuk sorting dictionary')">
            <span class="q-icon">🐍</span>Buatkan fungsi Python
          </button>
          <button class="q-btn" onclick="quickSend('Aku butuh semangat dan motivasi hari ini')">
            <span class="q-icon">🔥</span>Kasih aku motivasi
          </button>
          <button class="q-btn" onclick="quickSend('Apa saja tips produktivitas terbaik?')">
            <span class="q-icon">⚡</span>Tips produktivitas
          </button>
        </div>
      </div>
    </div>

    <!-- INPUT -->
    <div class="input-wrap">
      <div class="input-box">
        <div class="i-row">
          <textarea id="chatInput" rows="1" placeholder="Ketik pesanmu…"
            onkeydown="handleKey(event)"
            oninput="autoResize(this);updateCount(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMsg()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div class="i-foot">
          <button class="f-chip" onclick="clearChat()">🗑 Clear</button>
          <button class="f-chip" onclick="resetInput()">✕ Hapus</button>
          <span class="char-ct" id="charCount">0 / 2000</span>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat">💬 Pesan: <span class="stat-v" id="msgCount">0</span></div>
        <div class="stat">🤖 Persona: <span class="stat-v" id="personaLabel">Umum</span></div>
        <div class="stat">💾 Riwayat: <span class="stat-v" id="histCount">0</span></div>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /layout -->

<script>
/* ===== PERSONAS ===== */
const PERSONAS = {
  default: {
    label:'Umum',
    system:'Kamu adalah NovAI, asisten AI cerdas, ramah, dan helpful. Jawab dalam Bahasa Indonesia yang natural. Sesekali gunakan emoji agar terasa lebih friendly.'
  },
  programmer: {
    label:'Programmer',
    system:'Kamu adalah NovAI versi Programmer. Kamu ahli coding, debugging, dan arsitektur software. Berikan contoh kode yang jelas dengan penjelasan teknis. Bahasa Indonesia, istilah teknis boleh Inggris.'
  },
  teacher: {
    label:'Guru',
    system:'Kamu adalah NovAI versi Guru. Jelaskan segala hal dengan sabar, jelas, dan gunakan analogi mudah. Cocok untuk semua usia.'
  },
  motivator: {
    label:'Motivator',
    system:'Kamu adalah NovAI versi Motivator. Penuh semangat, inspiratif, dan selalu mendorong pengguna percaya pada diri sendiri. Gunakan Bahasa Indonesia yang energik dan membakar semangat.'
  },
  friend: {
    label:'Teman Curhat',
    system:'Kamu adalah NovAI versi Teman Curhat. Empatik, hangat, tidak menghakimi. Buat pengguna merasa dimengerti. Gunakan bahasa santai dan penuh kasih.'
  },
  writer: {
    label:'Penulis',
    system:'Kamu adalah NovAI versi Penulis. Ahli menulis kreatif, copywriting, dan storytelling. Bantu pengguna mengekspresikan ide mereka dengan indah.'
  }
};

/* ===== STATE ===== */
let history = [];        // conversation for API
let chatHistory = [];    // sidebar history list
let msgCount = 0;
let histCount = 0;
let isLoading = false;
let currentPersona = 'default';
let currentTitle = 'Chat baru';

/* ===== SIDEBAR TOGGLE (mobile) ===== */
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

/* ===== PERSONA ===== */
function setPersona(el, key, label){
  currentPersona = key;
  document.querySelectorAll('.p-item').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('topPersonaLabel').textContent = label;
  document.getElementById('personaLabel').textContent = PERSONAS[key].label;
  history = [];
  closeSidebar();
}

/* ===== INPUT HELPERS ===== */
function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,160)+'px';
}
function updateCount(el){
  document.getElementById('charCount').textContent=el.value.length+' / 2000';
}
function resetInput(){
  const i=document.getElementById('chatInput');
  i.value=''; i.style.height='auto'; updateCount(i);
}
function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}
function quickSend(t){
  document.getElementById('chatInput').value=t;
  sendMsg();
}

/* ===== DOM HELPERS ===== */
function hideWelcome(){
  const w=document.getElementById('welcomeEl');
  if(w) w.remove();
}
function scrollBottom(){
  const m=document.getElementById('messages');
  m.scrollTop=m.scrollHeight;
}

/* ===== MESSAGES ===== */
function addUserMsg(text){
  hideWelcome();
  const msgs=document.getElementById('messages');
  const now=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  const d=document.createElement('div');
  d.className='msg-row user';
  d.innerHTML=`
    <div class="m-av">K</div>
    <div class="m-body">
      <div class="bubble">${esc(text)}</div>
      <div class="m-meta">
        <span>${now}</span>
        <span class="meta-btn" onclick="copyTxt(this,'${esc(text)}')">Salin</span>
      </div>
    </div>`;
  msgs.appendChild(d); scrollBottom();
  msgCount++; document.getElementById('msgCount').textContent=msgCount;
}

function addTyping(){
  hideWelcome();
  const msgs=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg-row ai'; d.id='typingRow';
  d.innerHTML=`
    <div class="m-av">🤖</div>
    <div class="m-body">
      <div class="typing-bub"><div class="td"></div><div class="td"></div><div class="td"></div></div>
    </div>`;
  msgs.appendChild(d); scrollBottom();
}

function removeTyping(){
  const t=document.getElementById('typingRow');
  if(t) t.remove();
}

function addAiMsg(text){
  const msgs=document.getElementById('messages');
  const now=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  const d=document.createElement('div');
  d.className='msg-row ai';
  const safe=text.replace(/`/g,'&#96;');
  d.innerHTML=`
    <div class="m-av">🤖</div>
    <div class="m-body">
      <div class="bubble">${fmt(text)}</div>
      <div class="m-meta">
        <span>NovAI · ${now}</span>
        <span class="meta-btn" onclick="copyTxt(this,\`${safe}\`)">Salin</span>
      </div>
    </div>`;
  msgs.appendChild(d); scrollBottom();
  msgCount++; document.getElementById('msgCount').textContent=msgCount;
}

/* ===== FORMAT TEXT ===== */
function fmt(t){
  return t
    .replace(/```(\w+)?\n?([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
    .replace(/`([^`\n]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>')
    .replace(/^/,'<p>').replace(/$/,'</p>');
}
function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

/* ===== COPY ===== */
function copyTxt(el, text){
  navigator.clipboard.writeText(text).catch(()=>{});
  const orig=el.textContent;
  el.textContent='✓ Disalin';
  setTimeout(()=>el.textContent=orig,1500);
}

/* ===== SIDEBAR HISTORY ===== */
function addToHistory(title){
  histCount++;
  document.getElementById('histCount').textContent=histCount;
  const list=document.getElementById('historyList');
  // clear placeholder
  if(list.querySelector('div[style]')) list.innerHTML='';
  const d=document.createElement('div');
  d.className='h-item';
  d.innerHTML=`
    <div class="h-title">💬 ${title.substring(0,32)}${title.length>32?'…':''}</div>
    <div class="h-preview">Chat #${histCount}</div>`;
  list.insertBefore(d,list.firstChild);
}

/* ===== SEND ===== */
async function sendMsg(){
  if(isLoading) return;
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text||text.length>2000) return;

  resetInput();
  document.getElementById('sendBtn').disabled=true;
  isLoading=true;

  // First message → save to history
  if(history.length===0) addToHistory(text);

  addUserMsg(text);
  history.push({role:'user',content:text});
  addTyping();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
  method: 'POST',
  headers: {
    'Content-Type': 'application/json',
    'Authorization': 'Bearer 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'
  },
  body: JSON.stringify({
    model: 'llama-3.3-70b-versatile',
    messages: [
      {
        role: 'system',
        content: PERSONAS[currentPersona].system
      },
      ...history
    ],
    temperature: 0.7,
    max_tokens: 1000
  })
});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
 const reply = data.choices[0].message.content;
    history.push({role:'assistant',content:reply});
    removeTyping();
    addAiMsg(reply);
  } catch(e){
    removeTyping();
    addAiMsg('Maaf, gagal menghubungi server. Periksa koneksi dan coba lagi. 🙏');
    history.pop();
    console.error(e);
  } finally {
    isLoading=false;
    document.getElementById('sendBtn').disabled=false;
    document.getElementById('chatInput').focus();
  }
}

/* ===== EXPORT ===== */
function exportChat(){
  if(history.length===0){alert('Belum ada percakapan.');return;}
  const lines=history.map(m=>`[${m.role==='user'?'Kamu':'NovAI'}]:\n${m.content}`).join('\n\n---\n\n');
  const blob=new Blob([lines],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='chat-novai.txt'; a.click();
}
